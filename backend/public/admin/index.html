<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>77Cheesecake — Admin Panel</title>
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181f;
      --card: #1e1e28;
      --border: #2a2a38;
      --primary: #e8a5c0;
      --primary-dark: #c97fa4;
      --text: #f0f0f8;
      --muted: #888898;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
      --info: #60a5fa;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── AUTH ── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .auth-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 36px; width: 100%; max-width: 360px;
      text-align: center;
    }
    .auth-logo { font-size: 36px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .auth-sub  { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .auth-input {
      width: 100%; padding: 14px 16px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 15px; outline: none; margin-bottom: 14px;
      transition: border-color .2s;
    }
    .auth-input:focus { border-color: var(--primary); }
    .auth-btn {
      width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: var(--primary); color: #1a0610; font-size: 15px;
      font-weight: 700; cursor: pointer; transition: background .2s;
    }
    .auth-btn:hover { background: var(--primary-dark); }
    .auth-error { color: var(--danger); font-size: 13px; margin-top: 10px; }

    /* ── APP ── */
    #app-screen { display: none; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .topbar-title { font-size: 17px; font-weight: 700; color: var(--primary); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-refresh {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
      transition: all .2s;
    }
    .topbar-refresh:hover { border-color: var(--primary); color: var(--primary); }
    .topbar-logout {
      background: transparent; border: none; color: var(--muted);
      font-size: 13px; cursor: pointer;
    }

    .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* ── STATS ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 20px;
    }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 13px; cursor: pointer;
      transition: all .2s;
    }
    .tab.active { background: var(--primary); color: #1a0610; border-color: var(--primary); font-weight: 600; }

    /* ── ORDERS TABLE ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--surface); text-align: left; padding: 12px 16px;
      font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: .05em;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    td {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 13px; vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-pending_payment { background: #3a2a10; color: var(--warning); }
    .badge-new            { background: #1a2a3a; color: var(--info); }
    .badge-preparing      { background: #2a1a3a; color: #c4b5fd; }
    .badge-ready          { background: #1a3a2a; color: var(--success); }
    .badge-delivered      { background: #1a3a1a; color: var(--success); }
    .badge-cancelled      { background: #3a1a1a; color: var(--danger); }

    .status-select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 6px 10px;
      font-size: 12px; cursor: pointer; outline: none;
    }
    .status-select:focus { border-color: var(--primary); }

    .order-num { font-weight: 700; color: var(--primary); }
    .user-name { font-weight: 600; }
    .user-phone { color: var(--muted); font-size: 12px; }
    .items-list { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .total { font-weight: 700; }

    /* ── SETTINGS PANEL ── */
    .settings-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-top: 28px;
    }
    .settings-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .settings-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .settings-input {
      flex: 1; min-width: 200px; padding: 12px 14px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 14px; outline: none;
    }
    .settings-input:focus { border-color: var(--primary); }
    .settings-btn {
      padding: 12px 20px; border-radius: 10px; border: none;
      background: var(--primary); color: #1a0610; font-size: 14px;
      font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .settings-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .settings-success { color: var(--success); font-size: 13px; margin-top: 8px; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; }
    .spinner { border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin .6s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🍰</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:4px">77Cheesecake</div>
    <div class="auth-sub">Admin panel — Kirish</div>
    <input id="auth-key" class="auth-input" type="password" placeholder="Admin kalit so'zi" autofocus/>
    <button class="auth-btn" onclick="login()">Kirish</button>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <span class="topbar-title">🍰 Admin Panel</span>
    <div class="topbar-right">
      <span id="last-refresh" style="font-size:12px;color:var(--muted)"></span>
      <button class="topbar-refresh" onclick="loadOrders()">⟳ Yangilash</button>
      <button class="topbar-logout" onclick="logout()">Chiqish</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Jami buyurtmalar</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-today">—</div><div class="stat-label">Bugungi buyurtmalar</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-new">—</div><div class="stat-label">Yangi (kutilmoqda)</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-revenue">—</div><div class="stat-label">Bugungi daromad</div></div>
    </div>

    <!-- Filter tabs -->
    <div class="tabs" id="filter-tabs">
      <button class="tab active" onclick="setFilter('all', this)">Hammasi</button>
      <button class="tab" onclick="setFilter('pending_payment', this)">To'lov kutilmoqda</button>
      <button class="tab" onclick="setFilter('new', this)">Yangi</button>
      <button class="tab" onclick="setFilter('preparing', this)">Tayyorlanmoqda</button>
      <button class="tab" onclick="setFilter('ready', this)">Tayyor</button>
      <button class="tab" onclick="setFilter('delivered', this)">Yetkazildi</button>
      <button class="tab" onclick="setFilter('cancelled', this)">Bekor qilindi</button>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="table-wrap">
      <div class="spinner"></div>
    </div>

    <!-- Settings -->
    <div class="settings-card">
      <div class="settings-title">⚙️ Telegram Guruh Sozlamalari</div>
      <div class="settings-row">
        <input id="group-chat-id" class="settings-input" type="text" placeholder="Guruh Chat ID (masalan: -1001234567890)"/>
        <button class="settings-btn" onclick="saveGroupId()">Saqlash</button>
      </div>
      <div class="settings-hint">Guruh Chat ID ni olish uchun guruhga botni qo'shing va /chatid yuboring</div>
      <div id="settings-msg"></div>
    </div>
  </div>
</div>

<script>
  let adminKey = '';
  let allOrders = [];
  let currentFilter = 'all';
  let autoRefreshTimer = null;

  const STATUS_LABELS = {
    pending_payment: "⏳ To'lov kutilmoqda",
    new: '🆕 Yangi',
    preparing: '👨‍🍳 Tayyorlanmoqda',
    ready: '✅ Tayyor',
    delivered: '📦 Yetkazildi',
    cancelled: '❌ Bekor qilindi',
  };

  // ── AUTH ──
  function login() {
    const key = document.getElementById('auth-key').value.trim();
    if (!key) return;
    adminKey = key;
    document.getElementById('auth-error').textContent = '';
    loadOrders(true);
  }
  document.getElementById('auth-key').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  function logout() {
    adminKey = '';
    clearInterval(autoRefreshTimer);
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }

  // ── LOAD ORDERS ──
  async function loadOrders(fromLogin = false) {
    try {
      const res = await fetch('/api/v1/orders/admin/all', {
        headers: { 'x-admin-key': adminKey }
      });
      if (res.status === 403) {
        if (fromLogin) document.getElementById('auth-error').textContent = 'Noto\'g\'ri kalit so\'zi!';
        return;
      }
      allOrders = await res.json();

      if (fromLogin) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        loadSettings();
        startAutoRefresh();
      }

      updateStats();
      renderTable();
      document.getElementById('last-refresh').textContent = 'Yangilandi: ' + new Date().toLocaleTimeString('uz-UZ');
    } catch (e) {
      console.error(e);
    }
  }

  function startAutoRefresh() {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => loadOrders(), 30000);
  }

  // ── STATS ──
  function updateStats() {
    const today = new Date().toDateString();
    const todayOrders = allOrders.filter(o => new Date(o.createdAt).toDateString() === today);
    const newOrders = allOrders.filter(o => o.status === 'new' || o.status === 'preparing');
    const revenue = todayOrders
      .filter(o => o.status !== 'cancelled' && o.status !== 'pending_payment')
      .reduce((sum, o) => sum + Number(o.totalAmount), 0);

    document.getElementById('stat-total').textContent = allOrders.length;
    document.getElementById('stat-today').textContent = todayOrders.length;
    document.getElementById('stat-new').textContent = newOrders.length;
    document.getElementById('stat-revenue').textContent = fmt(revenue) + ' so\'m';
  }

  // ── FILTER ──
  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  // ── RENDER ──
  function renderTable() {
    const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
    const wrap = document.getElementById('table-wrap');

    if (filtered.length === 0) {
      wrap.innerHTML = '<div class="empty">Buyurtmalar topilmadi</div>';
      return;
    }

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Mijoz</th>
            <th>Sana</th>
            <th>Yetkazish</th>
            <th>Manzil</th>
            <th>Mahsulotlar</th>
            <th>Jami</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(order => `
            <tr>
              <td class="order-num">#${String(order.orderNumber).padStart(4,'0')}</td>
              <td>
                <div class="user-name">${order.user?.firstName || '—'} ${order.user?.lastName || ''}</div>
                <div class="user-phone">${order.user?.phone || order.user?.telegramId || '—'}</div>
              </td>
              <td style="white-space:nowrap;color:var(--muted)">${formatDate(order.createdAt)}</td>
              <td>${order.deliveryType === 'delivery' ? '🚗 Yetkazish' : '🏪 Olib ketish'}</td>
              <td style="max-width:160px;font-size:12px;color:var(--muted)">${order.address || '—'}</td>
              <td>
                <div class="items-list">${(order.items || []).map(i =>
                  `${i.productNameUz} ×${i.quantity}`
                ).join('<br>')}</div>
              </td>
              <td class="total">${fmt(order.totalAmount)} so'm</td>
              <td>
                <div style="margin-bottom:6px"><span class="badge badge-${order.status}">${STATUS_LABELS[order.status] || order.status}</span></div>
                <select class="status-select" onchange="changeStatus('${order.id}', this.value)" ${order.status === 'cancelled' || order.status === 'delivered' ? 'disabled' : ''}>
                  ${Object.entries(STATUS_LABELS).map(([val, label]) =>
                    `<option value="${val}" ${order.status === val ? 'selected' : ''}>${label}</option>`
                  ).join('')}
                </select>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // ── STATUS UPDATE ──
  async function changeStatus(orderId, status) {
    try {
      await fetch(`/api/v1/orders/${orderId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ status }),
      });
      await loadOrders();
    } catch (e) {
      alert('Xatolik: ' + e.message);
    }
  }

  // ── SETTINGS ──
  async function loadSettings() {
    try {
      const res = await fetch('/api/v1/settings');
      const data = await res.json();
      if (data.CAFE_GROUP_CHAT_ID) {
        document.getElementById('group-chat-id').value = data.CAFE_GROUP_CHAT_ID;
      }
    } catch (e) {}
  }

  async function saveGroupId() {
    const val = document.getElementById('group-chat-id').value.trim();
    if (!val) return;
    const msg = document.getElementById('settings-msg');
    try {
      await fetch('/api/v1/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ CAFE_GROUP_CHAT_ID: val }),
      });
      msg.className = 'settings-success';
      msg.textContent = '✅ Saqlandi! Endi yangi buyurtmalar shu guruhga yuboriladi.';
      setTimeout(() => msg.textContent = '', 4000);
    } catch (e) {
      msg.style.color = 'var(--danger)';
      msg.textContent = 'Xatolik: ' + e.message;
    }
  }

  // ── UTILS ──
  function fmt(num) {
    return Number(num).toLocaleString('ru-RU');
  }
  function formatDate(iso) {
    return new Date(iso).toLocaleString('uz-UZ', {
      day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
    });
  }
</script>
</body>
</html>
